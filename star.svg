<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Custom 5-point pixel-art star, golden yellow with dark outline -->
  <!-- Row 1: top tip -->
  <rect x="28" y="0"  width="8" height="4" fill="#fbbf24"/>
  <!-- Row 2 -->
  <rect x="26" y="4"  width="12" height="4" fill="#fbbf24"/>
  <!-- Row 3 -->
  <rect x="24" y="8"  width="16" height="4" fill="#f59e0b"/>
  <!-- Row 4: wide body start -->
  <rect x="0"  y="12" width="64" height="4" fill="#fbbf24"/>
  <!-- Row 5 -->
  <rect x="0"  y="16" width="64" height="4" fill="#f59e0b"/>
  <!-- Row 6: narrowing -->
  <rect x="8"  y="20" width="48" height="4" fill="#fbbf24"/>
  <!-- Row 7 -->
  <rect x="12" y="24" width="40" height="4" fill="#f59e0b"/>
  <!-- Row 8: split for lower two points -->
  <rect x="0"  y="28" width="24" height="4" fill="#fbbf24"/>
  <rect x="40" y="28" width="24" height="4" fill="#fbbf24"/>
  <!-- Row 9 -->
  <rect x="0"  y="32" width="20" height="4" fill="#f59e0b"/>
  <rect x="44" y="32" width="20" height="4" fill="#f59e0b"/>
  <!-- Row 10 -->
  <rect x="0"  y="36" width="16" height="4" fill="#fbbf24"/>
  <rect x="48" y="36" width="16" height="4" fill="#fbbf24"/>
  <!-- Row 11 -->
  <rect x="0"  y="40" width="12" height="4" fill="#f59e0b"/>
  <rect x="52" y="40" width="12" height="4" fill="#f59e0b"/>
  <!-- Row 12 -->
  <rect x="0"  y="44" width="8"  height="4" fill="#fbbf24"/>
  <rect x="56" y="44" width="8"  height="4" fill="#fbbf24"/>
  <!-- Row 13 -->
  <rect x="0"  y="48" width="4"  height="4" fill="#f59e0b"/>
  <rect x="60" y="48" width="4"  height="4" fill="#f59e0b"/>
  <!-- Shine dots -->
  <rect x="20" y="8"  width="4" height="4" fill="#fef3c7"/>
  <rect x="44" y="8"  width="4" height="4" fill="#fef3c7"/>
  <rect x="28" y="16" width="4" height="4" fill="#fef3c7"/>
</svg>
